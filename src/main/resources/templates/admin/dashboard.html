<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Panel Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: linear-gradient(135deg, #0f1724, #1a2a3a);
            color: white;
            padding: 25px 35px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 10px 40px rgba(15, 23, 36, 0.2);
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header h1 i { color: #fbbf24; }
        
        .header .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .header .user-info span {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 500;
        }
        .header .user-info a {
            color: #94a3b8;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 30px;
            transition: all 0.3s;
        }
        .header .user-info a:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .header .user-info .logout {
            color: #f87171;
        }
        .header .user-info .logout:hover {
            background: rgba(248, 113, 113, 0.15);
            color: #fca5a5;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.04);
            transition: all 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        .stat-card .icon {
            font-size: 32px;
            margin-bottom: 10px;
        }
        .stat-card .number {
            font-size: 32px;
            font-weight: 800;
            color: #0f1724;
        }
        .stat-card .label {
            color: #64748b;
            font-size: 14px;
            font-weight: 500;
        }
        
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }
        
        .menu-card {
            background: white;
            padding: 30px 20px;
            border-radius: 16px;
            text-align: center;
            text-decoration: none;
            color: #0f1724;
            box-shadow: 0 5px 20px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.04);
            transition: all 0.3s;
        }
        .menu-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 40px rgba(15, 23, 36, 0.1);
        }
        .menu-card .icon {
            font-size: 40px;
            margin-bottom: 12px;
        }
        .menu-card h3 {
            font-size: 16px;
            font-weight: 600;
        }
        .menu-card p {
            font-size: 13px;
            color: #64748b;
            margin-top: 4px;
        }
        
        @media (max-width: 600px) {
            .header { padding: 20px; }
            .header h1 { font-size: 20px; }
            .stats { grid-template-columns: 1fr; }
            .menu-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        
        <div class="header">
            <h1><i class="fas fa-gauge-high"></i> Panel Admin</h1>
            <div class="user-info">
                <span><i class="fas fa-user-circle"></i> <span th:text="${usuario.nombre}">Admin</span></span>
                <a href="/menu"><i class="fas fa-home"></i> Inicio</a>
                <a href="/logout" class="logout"><i class="fas fa-sign-out-alt"></i> Cerrar</a>
            </div>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="icon">👥</div>
                <div class="number" th:text="${totalGuias}">0</div>
                <div class="label">Guías Registrados</div>
            </div>
            <div class="stat-card">
                <div class="icon">✈️</div>
                <div class="number">4</div>
                <div class="label">Destinos</div>
            </div>
            <div class="stat-card">
                <div class="icon">📝</div>
                <div class="number">0</div>
                <div class="label">Reservas</div>
            </div>
        </div>
        
        <div class="menu-grid">
            <a href="/admin/guias" class="menu-card">
                <div class="icon">👥</div>
                <h3>Gestionar Guías</h3>
                <p>Agregar, editar o eliminar guías</p>
            </a>
            <a href="#" class="menu-card">
                <div class="icon">✈️</div>
                <h3>Gestionar Destinos</h3>
                <p>Administrar destinos turísticos</p>
            </a>
            <a href="#" class="menu-card">
                <div class="icon">📊</div>
                <h3>Reportes</h3>
                <p>Ver estadísticas del sistema</p>
            </a>
            <a href="/" class="menu-card">
                <div class="icon">🏠</div>
                <h3>Ver Sitio</h3>
                <p>Ir a la página principal</p>
            </a>
        </div>
    </div>
</body>
</html>
