<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestionar Guías</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* ===== HEADER ===== */
        .header {
            background: linear-gradient(135deg, #0f1724, #1a2a3a);
            color: white;
            padding: 25px 35px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 10px 40px rgba(15, 23, 36, 0.2);
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header h1 i {
            color: #fbbf24;
        }
        
        .header .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .header .user-info span {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 500;
        }
        
        .header .user-info a {
            color: #94a3b8;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 30px;
            transition: all 0.3s;
        }
        
        .header .user-info a:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        
        .header .user-info .logout {
            color: #f87171;
        }
        .header .user-info .logout:hover {
            background: rgba(248, 113, 113, 0.15);
            color: #fca5a5;
        }
        
        /* ===== ACCIONES ===== */
        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }
        
        .actions .btn {
            padding: 12px 28px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            border: none;
            cursor: pointer;
        }
        
        .actions .btn-primary {
            background: linear-gradient(135deg, #1a2a3a, #0f1724);
            color: white;
        }
        .actions .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(15, 23, 36, 0.3);
        }
        
        .actions .btn-secondary {
            background: #e2e8f0;
            color: #1a2a3a;
        }
        .actions .btn-secondary:hover {
            background: #cbd5e1;
            transform: translateY(-2px);
        }
        
        /* ===== CARD GRID ===== */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            transition: all 0.3s;
            border: 1px solid rgba(0,0,0,0.04);
        }
        
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 50px rgba(15, 23, 36, 0.12);
        }
        
        .card-header {
            padding: 25px 20px 15px;
            text-align: center;
            background: linear-gradient(135deg, #f8fafc, #f1f5f9);
            position: relative;
        }
        
        .card-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            background: #e2e8f0;
            transition: all 0.3s;
        }
        
        .card:hover .card-avatar {
            transform: scale(1.05);
        }
        
        .card-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 5px 16px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 700;
        }
        
        .badge-disponible {
            background: #dcfce7;
            color: #16a34a;
        }
        .badge-no-disponible {
            background: #fee2e2;
            color: #dc2626;
        }
        
        .card-body {
            padding: 20px;
        }
        
        .card-body h3 {
            font-size: 20px;
            color: #0f1724;
            margin-bottom: 4px;
        }
        
        .card-body .idioma {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 12px;
        }
        
        .card-body .info {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            font-size: 13px;
            margin-bottom: 15px;
        }
        
        .card-body .info .tag {
            background: #f1f5f9;
            padding: 4px 14px;
            border-radius: 30px;
            color: #1a2a3a;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .card-body .info .tag-precio {
            background: #dbeafe;
            color: #1e40af;
            font-weight: 600;
        }
        
        .card-body .info .tag-puntuacion {
            background: #fef3c7;
            color: #92400e;
        }
        
        .card-actions {
            display: flex;
            gap: 8px;
            padding-top: 15px;
            border-top: 1px solid #f1f5f9;
        }
        
        .card-actions .btn-sm {
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            border: none;
            cursor: pointer;
        }
        
        .card-actions .btn-edit {
            background: #dbeafe;
            color: #2563eb;
        }
        .card-actions .btn-edit:hover {
            background: #bfdbfe;
        }
        
        .card-actions .btn-delete {
            background: #fee2e2;
            color: #dc2626;
        }
        .card-actions .btn-delete:hover {
            background: #fecaca;
        }
        
        .empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 20px;
            color: #94a3b8;
        }
        .empty .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 15px;
        }
        
        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .header { padding: 20px; }
            .header h1 { font-size: 20px; }
            .card-grid { grid-template-columns: 1fr; }
            .actions .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        
        <!-- HEADER -->
        <div class="header">
            <h1><i class="fas fa-people-group"></i> Guías Turísticos</h1>
            <div class="user-info">
                <span><i class="fas fa-user-circle"></i> <span th:text="${usuario.nombre}">Admin</span></span>
                <a href="/admin/dashboard"><i class="fas fa-chart-pie"></i> Dashboard</a>
                <a href="/logout" class="logout"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a>
            </div>
        </div>
        
        <!-- ACCIONES -->
        <div class="actions">
            <a href="/admin/guias/nuevo" class="btn btn-primary"><i class="fas fa-plus-circle"></i> Agregar Guía</a>
            <a href="/admin/dashboard" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Volver</a>
        </div>
        
        <!-- GRID DE GUIAS -->
        <div class="card-grid">
            <div th:each="g : ${guias}" class="card">
                <div class="card-header">
                    <img th:src="${g.foto}" alt="Foto" class="card-avatar">
                    <span class="card-badge" 
                          th:class="${g.disponible} ? 'badge-disponible' : 'badge-no-disponible'"
                          th:text="${g.disponible} ? '✅ Disponible' : '❌ No disponible'">
                    </span>
                </div>
                <div class="card-body">
                    <h3 th:text="${g.nombre}">Juan Pérez</h3>
                    <div class="idioma"><i class="fas fa-language"></i> <span th:text="${g.idioma}">Español, Inglés</span></div>
                    
                    <div class="info">
                        <span class="tag tag-precio"><i class="fas fa-coins"></i> S/ <span th:text="${g.tarifaHora}">50.00</span>/h</span>
                        <span class="tag tag-puntuacion"><i class="fas fa-star"></i> <span th:text="${g.puntuacion}">4.8</span>/5</span>
                        <span class="tag"><i class="fas fa-hashtag"></i> #<span th:text="${g.id}">1</span></span>
                    </div>
                    
                    <div class="card-actions">
                        <a th:href="'/admin/guias/editar/' + ${g.id}" class="btn-sm btn-edit"><i class="fas fa-pen"></i> Editar</a>
                        <a th:href="'/admin/guias/eliminar/' + ${g.id}" class="btn-sm btn-delete" 
                           onclick="return confirm('¿Eliminar este guía?')"><i class="fas fa-trash"></i> Eliminar</a>
                    </div>
                </div>
            </div>
            
            <div th:if="${guias.empty}" class="empty">
                <span class="icon">📭</span>
                No hay guías registrados
            </div>
        </div>
    </div>
</body>
</html>
