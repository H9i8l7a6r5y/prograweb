<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntiRoutes — Iniciar Sesión</title>
    
    <!-- ===== FONT AWESOME (ÍCONOS) ===== -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

        * {
            box-sizing: border-box;
            transition: all 0.2s ease-in-out;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: url('https://www.image2url.com/r2/default/images/1779401676136-ac287fd1-7679-4276-ad6b-33c34d4e9b43.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.92);
            padding: 40px 32px;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .header-zone {
            text-align: center;
            margin-bottom: 32px;
        }

        /* ===== ÍCONO PLANETA + AVIÓN ===== */
        .logo-icon {
            font-size: 48px;
            color: #4f46e5;
            display: block;
            margin-bottom: 10px;
            position: relative;
            display: inline-block;
        }
        
        .logo-icon .fa-earth-americas {
            font-size: 48px;
            color: #4f46e5;
        }
        
        .logo-icon .fa-plane {
            font-size: 20px;
            color: #fbbf24;
            position: absolute;
            bottom: 2px;
            right: -8px;
            transform: rotate(45deg);
            background: white;
            border-radius: 50%;
            padding: 2px;
        }

        .flag-badge {
            font-size: 24px;
            background: #fff5f5;
            padding: 8px 16px;
            border-radius: 12px;
            display: inline-block;
            box-shadow: 0 4px 12px rgba(219, 68, 85, 0.08);
            margin-bottom: 12px;
        }

        h1 {
            color: #0f172a;
            font-size: 24px;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #475569;
            font-size: 14px;
            margin-top: 8px;
            margin-bottom: 0;
        }

        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 6px;
        }

        .input-group label i {
            color: #4f46e5;
            margin-right: 6px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #cbd5e1;
            border-radius: 12px;
            font-family: inherit;
            font-size: 15px;
            color: #0f172a;
            background-color: rgba(255, 255, 255, 0.8);
        }

        input:focus {
            outline: none;
            border-color: #4f46e5;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
        }

        input::placeholder {
            color: #94a3b8;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4);
            background: linear-gradient(135deg, #5a52e6 0%, #4338ca 100%);
        }

        button:active {
            transform: translateY(1px);
        }

        .exito {
            margin-top: 24px;
            padding: 12px 16px;
            background: #dcfce7;
            border: 1px solid #bbf7d0;
            border-radius: 12px;
            color: #14532d;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .footer-text {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #334155;
            margin-bottom: 0;
        }

        .footer-text a {
            color: #4f46e5;
            text-decoration: none;
            font-weight: 600;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-zone">
            <!-- ===== ÍCONO PLANETA + AVIÓN ===== -->
            <span class="logo-icon">
                <i class="fas fa-earth-americas"></i>
                <i class="fas fa-plane"></i>
            </span>
            
            <div class="flag-badge"></div>
            <h1>IntiRoutes</h1>
            <p class="subtitle">Explora destinos e historias inolvidables</p>
        </div>

        <form action="/login" method="post">
            <div class="input-group">
                <label for="email"><i class="fas fa-envelope"></i> Correo electrónico</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
            </div>
            
            <div class="input-group">
                <label for="password"><i class="fas fa-lock"></i> Contraseña</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit">
                <i class="fas fa-arrow-right-to-bracket"></i> Iniciar Sesión
            </button>
        </form>

        <div class="exito">
            <span>✨</span> Tu aplicación web está funcionando correctamente
        </div>

        <p class="footer-text">¿No tienes cuenta? <a href="/registro"><i class="fas fa-user-plus"></i> Regístrate aquí</a></p>
    </div>

</body>
</html>
